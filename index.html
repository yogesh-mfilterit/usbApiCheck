<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Device Type Detector</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; line-height: 1.5; max-width: 900px; margin: 0 auto; }
    button { padding: 12px 20px; margin: 10px 0; cursor: pointer; font-size: 16px; }
    .verdict { font-size: 24px; font-weight: bold; padding: 18px; border-radius: 12px; margin: 15px 0; text-align: center; }
    .verdict.desktop { background: #e3f2fd; color: #0b5fa5; }
    .verdict.uncertain { background: #fff3e0; color: #b26a00; }
    .bar-row { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
    .bar-label { width: 160px; font-size: 14px; }
    .bar-track { flex: 1; background: #eee; border-radius: 6px; height: 18px; overflow: hidden; }
    .bar-fill { height: 100%; }
    .bar-fill.desktop { background: #0b5fa5; }
    table { border-collapse: collapse; width: 100%; margin-top: 15px; font-size: 14px; }
    td, th { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background: #f6f8fa; }
    .note { font-size: 13px; color: #888; margin-top: 6px; }
  </style>
</head>
<body>
  <h1>Device Type Detector — Port Signals Only</h1>
  <button id="detectBtn">🔍 Detect Device Type</button>

  <div id="verdictBox"></div>
  <div id="bars"></div>
  <table id="signalTable"></table>

  <script>
    async function classifyDevice() {
      const hasWebHID = "hid" in navigator;
      const hasWebSerial = "serial" in navigator;
      const hasWebUSB = "usb" in navigator;

      // Only signals that can actually PROVE desktop count toward the score.
      // WebUSB presence does NOT go in here: Android Chrome and desktop Chrome
      // both expose it, so it can't tell them apart. Giving it partial credit
      // (the old bug) silently biased every Chromium phone toward "Desktop".
      let desktopScore = 0;
      let decisiveWeight = 0;

      decisiveWeight += 30;
      if (hasWebHID) desktopScore += 30;

      decisiveWeight += 30;
      if (hasWebSerial) desktopScore += 30;

      // Paired USB devices — only count it if at least one paired device is a
      // class typically used by external peripherals (HID/printer/mass storage).
      // Counting ANY paired device was too loose: a phone with one paired USB
      // flash drive would have wrongly scored as desktop evidence.
      let hasPeripheral = false;
      let pairedCount = 0;
      if (hasWebUSB) {
        try {
          const devices = await navigator.usb.getDevices();
          pairedCount = devices.length;
          const peripheralClasses = [3, 7, 8]; // HID, printer, mass storage
          hasPeripheral = devices.some(d => {
            const ifaceClass = d.configurations?.[0]?.interfaces?.[0]?.alternates?.[0]?.interfaceClass;
            return peripheralClasses.includes(d.deviceClass) || peripheralClasses.includes(ifaceClass);
          });
        } catch (e) {}
      }
      decisiveWeight += 15;
      if (hasPeripheral) desktopScore += 15;

      // External monitor
      const hasExtended = typeof screen !== "undefined" && "isExtended" in screen && screen.isExtended;
      decisiveWeight += 15;
      if (hasExtended) desktopScore += 15;

      const desktopPct = decisiveWeight > 0 ? Math.round((desktopScore / decisiveWeight) * 100) : 0;

      // Three states, not two. No port signal here is mobile-exclusive, so the
      // detector is only allowed to confidently say "Desktop". Anything below
      // threshold is "Uncertain" — NOT "likely mobile", since a Firefox/Safari
      // desktop browser also fails these checks and isn't a phone.
      let verdict = "uncertain";
      if (desktopPct >= 60) verdict = "desktop";

      return {
        desktopPct,
        verdict,
        signals: [
          { name: "WebHID API", weight: 30, result: hasWebHID ? "💻 Desktop" : "— inconclusive" },
          { name: "Web Serial API", weight: 30, result: hasWebSerial ? "💻 Desktop" : "— inconclusive" },
          { name: "Paired USB peripheral class", weight: 15, result: hasPeripheral ? `💻 Desktop (${pairedCount} paired)` : "— inconclusive" },
          { name: "External Monitor", weight: 15, result: hasExtended ? "💻 Desktop" : "— inconclusive" },
          { name: "WebUSB Support (context only)", weight: 0, result: hasWebUSB ? "Present — Android Chrome has this too, no score given" : "Absent — could be iOS, Firefox, or Safari, no score given" }
        ]
      };
    }

    function renderResult() {
      classifyDevice().then(result => {
        const verdictBox = document.getElementById("verdictBox");
        const bars = document.getElementById("bars");
        const table = document.getElementById("signalTable");

        if (result.verdict === "desktop") {
          verdictBox.innerHTML = `
            <div class="verdict desktop">
              ✅ Yes, this is Desktop / Laptop<br>
              <small>Desktop Signal: ${result.desktopPct}%</small>
            </div>`;
        } else {
          verdictBox.innerHTML = `
            <div class="verdict uncertain">
              ❓ Uncertain<br>
              <small>Desktop Signal: ${result.desktopPct}% — no desktop-only API detected. Could be mobile, or a Firefox/Safari desktop.</small>
            </div>`;
        }

        bars.innerHTML = `
          <div class="bar-row">
            <div class="bar-label">Desktop Signal</div>
            <div class="bar-track">
              <div class="bar-fill desktop" style="width: ${result.desktopPct}%"></div>
            </div>
            <div><strong>${result.desktopPct}%</strong></div>
          </div>
        `;

        table.innerHTML = `
          <tr><th>Signal</th><th>Weight</th><th>Result</th></tr>
          ${result.signals.map(s => `
            <tr>
              <td>${s.name}</td>
              <td>${s.weight}</td>
              <td>${s.result}</td>
            </tr>
          `).join('')}
        `;
      });
    }

    document.getElementById("detectBtn").addEventListener("click", renderResult);
  </script>
</body>
</html>
