<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Device Type Detector</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; line-height: 1.5; max-width: 900px; margin: 0 auto; }
    button { padding: 12px 20px; margin: 10px 0; cursor: pointer; font-size: 16px; }
    .verdict { font-size: 24px; font-weight: bold; padding: 18px; border-radius: 12px; margin: 15px 0; text-align: center; }
    .verdict.desktop { background: #e3f2fd; color: #0b5fa5; }
    .verdict.mobile { background: #e8f5e9; color: #1a7f37; }
    .verdict.uncertain { background: #fff3e0; color: #b26a00; }
    .bar-row { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
    .bar-label { width: 160px; font-size: 14px; }
    .bar-track { flex: 1; background: #eee; border-radius: 6px; height: 18px; overflow: hidden; }
    .bar-fill { height: 100%; }
    .bar-fill.desktop { background: #0b5fa5; }
    table { border-collapse: collapse; width: 100%; margin-top: 15px; font-size: 14px; }
    td, th { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background: #f6f8fa; }
  </style>
</head>
<body>
  <h1>Device Type Detector — Port Signals Only</h1>
  <button id="detectBtn">🔍 Detect Device Type</button>
  
  <div id="verdictBox"></div>
  <div id="bars"></div>
  <table id="signalTable"></table>

  <script>
    async function classifyDevice() {
      const hasWebHID = "hid" in navigator;
      const hasWebSerial = "serial" in navigator;
      const hasWebUSB = "usb" in navigator;

      let desktopScore = 0;
      let totalWeight = 0;

      // WebHID - Strong desktop signal
      totalWeight += 25;
      if (hasWebHID) desktopScore += 25;

      // Web Serial - Strong desktop signal
      totalWeight += 25;
      if (hasWebSerial) desktopScore += 25;

      // Paired USB Devices
      let hasPairedDevices = false;
      if (hasWebUSB) {
        try {
          const devices = await navigator.usb.getDevices();
          hasPairedDevices = devices.length > 0;
        } catch (e) {}
      }
      totalWeight += 20;
      if (hasPairedDevices) desktopScore += 20;

      // Extended Display (External Monitor)
      const hasExtended = typeof screen !== "undefined" && "isExtended" in screen && screen.isExtended;
      totalWeight += 15;
      if (hasExtended) desktopScore += 15;

      // WebUSB presence (neutral)
      totalWeight += 10;
      if (hasWebUSB) desktopScore += 5;   // small bonus

      const desktopPct = Math.round((desktopScore / totalWeight) * 100);

      return {
        desktopPct,
        isDesktop: desktopPct > 50,
        signals: [
          { name: "WebHID API", weight: 25, result: hasWebHID ? "Desktop" : "—" },
          { name: "Web Serial API", weight: 25, result: hasWebSerial ? "Desktop" : "—" },
          { name: "Paired USB Devices", weight: 20, result: hasPairedDevices ? "Desktop" : "—" },
          { name: "External Monitor", weight: 15, result: hasExtended ? "Desktop" : "—" },
          { name: "WebUSB Support", weight: 10, result: hasWebUSB ? "Neutral" : "—" }
        ]
      };
    }

    function renderResult() {
      classifyDevice().then(result => {
        const verdictBox = document.getElementById("verdictBox");
        const bars = document.getElementById("bars");
        const table = document.getElementById("signalTable");

        if (result.isDesktop) {
          verdictBox.innerHTML = `
            <div class="verdict desktop">
              ✅ Yes, this is Desktop / Laptop<br>
              <small>Confidence: ${result.desktopPct}%</small>
            </div>`;
        } else {
          verdictBox.innerHTML = `
            <div class="verdict mobile">
              📱 Likely Mobile Device or Restricted Browser<br>
              <small>Desktop signal: ${result.desktopPct}%</small>
            </div>`;
        }

        // Progress Bar
        bars.innerHTML = `
          <div class="bar-row">
            <div class="bar-label">Desktop Signal</div>
            <div class="bar-track">
              <div class="bar-fill desktop" style="width: ${result.desktopPct}%"></div>
            </div>
            <div><strong>${result.desktopPct}%</strong></div>
          </div>
        `;

        // Signal Table
        table.innerHTML = `
          <tr><th>Signal</th><th>Weight</th><th>Result</th></tr>
          ${result.signals.map(s => `
            <tr>
              <td>${s.name}</td>
              <td>${s.weight}</td>
              <td>${s.result}</td>
            </tr>
          `).join('')}
        `;
      });
    }

    document.getElementById("detectBtn").addEventListener("click", renderResult);
  </script>
</body>
</html>
